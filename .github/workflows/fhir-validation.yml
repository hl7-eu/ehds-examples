name: FHIR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    name: FHIR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed spec folders
        id: detect_changed_folders
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Comparing changes between $BASE_SHA and $HEAD_SHA"
          mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          declare -A ALLOWED_FOLDERS=(
            [base]=1
            [eps]=1
            [lab]=1
            [mpd]=1
          )
          declare -A SEEN=()

          for path in "${CHANGED_FILES[@]}"; do
            [[ -z "$path" ]] && continue
            top_level="${path%%/*}"
            if [[ -n "${ALLOWED_FOLDERS[$top_level]:-}" ]]; then
              SEEN["$top_level"]=1
            fi
          done

          ORDERED_FOLDERS=()
          for folder in base eps lab mpd; do
            if [[ -n "${SEEN[$folder]:-}" ]]; then
              ORDERED_FOLDERS+=("$folder")
            fi
          done

          if [[ ${#ORDERED_FOLDERS[@]} -eq 0 ]]; then
            echo "No changed files in tracked spec folders."
            echo "has_changed_folders=false" >> "$GITHUB_OUTPUT"
            echo "changed_folders=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FOLDER_LIST="${ORDERED_FOLDERS[*]}"
          echo "Changed spec folders: $CHANGED_FOLDER_LIST"
          echo "has_changed_folders=true" >> "$GITHUB_OUTPUT"
          echo "changed_folders=$CHANGED_FOLDER_LIST" >> "$GITHUB_OUTPUT"

      - name: Collect FHIR files in changed folders
        id: collect_files
        if: steps.detect_changed_folders.outputs.has_changed_folders == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .ci
          : > .ci/target-files.txt
          : > .ci/changed-folders.txt

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          declare -A ALLOWED_FOLDERS=(
            [base]=1
            [eps]=1
            [lab]=1
            [mpd]=1
          )
          declare -A SEEN_CONTEXTS=()
          declare -A SEEN_FILES=()

          # First pass: collect changed directories inside tracked top-level folders.
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue

            top_level="${path%%/*}"
            if [[ -z "${ALLOWED_FOLDERS[$top_level]:-}" ]]; then
              continue
            fi

            context_dir="$(dirname "$path")"
            if [[ -n "$context_dir" && -z "${SEEN_CONTEXTS[$context_dir]:-}" ]]; then
              echo "$context_dir" >> .ci/changed-folders.txt
              SEEN_CONTEXTS["$context_dir"]=1
            fi
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [[ ! -s .ci/changed-folders.txt ]]; then
            echo "No changed folders found in tracked spec folders."
            echo "has_target_files=false" >> "$GITHUB_OUTPUT"
            echo "target_file_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE_COUNT=0
          # Second pass: validate all JSON/XML files in each changed directory (recursive).
          while IFS= read -r context_dir; do
            [[ -z "$context_dir" ]] && continue

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              if [[ -n "${SEEN_FILES[$file]:-}" ]]; then
                continue
              fi
              echo "$file" >> .ci/target-files.txt
              SEEN_FILES["$file"]=1
              FILE_COUNT=$((FILE_COUNT + 1))
            done < <(find "$context_dir" -type f \( -name '*.json' -o -name '*.xml' \) | sort)
          done < .ci/changed-folders.txt

          if [[ $FILE_COUNT -eq 0 ]]; then
            echo "No JSON/XML files found in changed folders of tracked spec folders."
            echo "has_target_files=false" >> "$GITHUB_OUTPUT"
            echo "target_file_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Collected $FILE_COUNT file(s) for validation from changed folder(s)."
          echo "has_target_files=true" >> "$GITHUB_OUTPUT"
          echo "target_file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Skip summary when there is nothing to validate
        if: steps.detect_changed_folders.outputs.has_changed_folders != 'true' || steps.collect_files.outputs.has_target_files != 'true'
        run: |
          echo "No relevant FHIR JSON/XML changes were detected in tracked spec folders. Validation skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Validate meta.profile presence and prefix
        if: steps.collect_files.outputs.has_target_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_PREFIX="http://hl7.eu/fhir/"
          MISSING_PROFILE=()
          MISSING_REQUIRED_PREFIX=()

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              *.json)
                PROFILE_LINES="$(jq -r '.meta.profile[]? // empty' "$file" 2>/dev/null || true)"
                ;;
              *.xml)
                if command -v xmllint >/dev/null 2>&1; then
                  PROFILE_LINES="$(
                    xmllint --xpath '//*[local-name()="meta"]/*[local-name()="profile"]/@value' "$file" 2>/dev/null \
                      | grep -oE 'value="[^"]+"' \
                      | sed -E 's/value="([^"]+)"/\1/' || true
                  )"
                else
                  PROFILE_LINES="$(
                    grep -oE '<([[:alnum:]_:-]+:)?profile[^>]*[[:space:]]value="[^"]+"' "$file" \
                      | sed -E 's/.*[[:space:]]value="([^"]+)".*/\1/' || true
                  )"
                fi
                ;;
              *)
                continue
                ;;
            esac

            if [[ -z "$PROFILE_LINES" ]]; then
              MISSING_PROFILE+=("$file")
              continue
            fi

            HAS_REQUIRED_PREFIX=false
            while IFS= read -r profile; do
              [[ -z "$profile" ]] && continue
              if [[ "$profile" == "$REQUIRED_PREFIX"* ]]; then
                HAS_REQUIRED_PREFIX=true
                break
              fi
            done <<< "$PROFILE_LINES"

            if [[ "$HAS_REQUIRED_PREFIX" != "true" ]]; then
              MISSING_REQUIRED_PREFIX+=("$file")
            fi
          done < .ci/target-files.txt

          if [[ ${#MISSING_PROFILE[@]} -gt 0 || ${#MISSING_REQUIRED_PREFIX[@]} -gt 0 ]]; then
            echo "meta.profile precheck failed."
            echo "Each resource must contain meta.profile, and at least one meta.profile entry must start with: $REQUIRED_PREFIX"
            echo

            if [[ ${#MISSING_PROFILE[@]} -gt 0 ]]; then
              echo "Resources missing meta.profile:"
              for file in "${MISSING_PROFILE[@]}"; do
                echo " - $file"
              done
              echo
            fi

            if [[ ${#MISSING_REQUIRED_PREFIX[@]} -gt 0 ]]; then
              echo "Resources where no meta.profile entry starts with $REQUIRED_PREFIX:"
              for file in "${MISSING_REQUIRED_PREFIX[@]}"; do
                echo " - $file"
              done
              echo
            fi

            exit 1
          fi

          echo "meta.profile precheck passed for all candidate resources."

      - name: Set up Java
        if: steps.collect_files.outputs.has_target_files == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve validator download URL
        id: validator_meta
        if: steps.collect_files.outputs.has_target_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          VALIDATOR_URL="https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar"
          LATEST_RELEASE_API="https://api.github.com/repos/hapifhir/org.hl7.fhir.core/releases/latest"
          LATEST_RELEASE_JSON="$(curl -fsSL "$LATEST_RELEASE_API" || true)"

          RELEASE_TAG="$(
            printf '%s' "$LATEST_RELEASE_JSON" \
              | sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
              | head -n 1
          )"

          if [[ -z "$RELEASE_TAG" ]]; then
            RELEASE_TAG="latest"
          fi

          CACHE_SUFFIX="$(echo "$RELEASE_TAG" | sed 's/[^a-zA-Z0-9._-]/-/g')"

          echo "validator_url=$VALIDATOR_URL" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "cache_key=validator-cli-${CACHE_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Restore cached validator
        if: steps.collect_files.outputs.has_target_files == 'true'
        id: validator_cache
        uses: actions/cache@v4
        with:
          path: .cache/fhir-validator/validator_cli.jar
          key: ${{ runner.os }}-${{ steps.validator_meta.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-validator-cli-

      - name: Download validator if cache miss
        if: steps.collect_files.outputs.has_target_files == 'true' && steps.validator_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .cache/fhir-validator
          curl -fsSL "${{ steps.validator_meta.outputs.validator_url }}" -o .cache/fhir-validator/validator_cli.jar

      - name: Run Java FHIR validator
        id: run_validator
        if: steps.collect_files.outputs.has_target_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          declare -a VALIDATOR_ARGS=()

          while IFS= read -r folder; do
            [[ -z "$folder" ]] && continue
            VALIDATOR_ARGS+=("-resolution-context" "$folder")
          done < .ci/changed-folders.txt

          VALIDATOR_ARGS+=("-ig" "hl7.fhir.eu.mpd#current")
          VALIDATOR_ARGS+=("-ig" "hl7.fhir.eu.laboratory#2.0.0")
          VALIDATOR_ARGS+=("-ig" "hl7.fhir.eu.eps#current")
          VALIDATOR_ARGS+=("-ig" "hl7.fhir.eu.hdr#current")
          VALIDATOR_ARGS+=("-ig" "hl7.fhir.eu.base#2.0.0")

          VALIDATOR_ARGS+=("-allow-example-urls" "true")
          VALIDATOR_ARGS+=("-html-output" "validation.html")
          VALIDATOR_ARGS+=("-output" "validation.json")
          VALIDATOR_ARGS+=("-show-message-ids")
          VALIDATOR_ARGS+=("-extension" "any")
          VALIDATOR_ARGS+=("-display-issues-are-warnings")

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            VALIDATOR_ARGS+=("$file")
          done < .ci/target-files.txt

          set +e
          java -jar .cache/fhir-validator/validator_cli.jar "${VALIDATOR_ARGS[@]}" 2>&1 | tee validator-cli.log
          EXIT_CODE=$?
          set -e

          echo "validator_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Render validation summary
        id: render_summary
        if: steps.collect_files.outputs.has_target_files == 'true'
        continue-on-error: false
        uses: patrick-werner/validation-outcome-markdown-renderer@v1
        with:
          bundle-file: validation.json
          include: warnings
          pr-summary-path: pr-summary.md

      - name: Upload HTML validation report
        id: upload_html_report
        if: always() && steps.collect_files.outputs.has_target_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fhir-validation-html-report
          path: validation.html
          if-no-files-found: warn

      - name: Fail workflow when validator reports errors
        if: always() && steps.collect_files.outputs.has_target_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          EXIT_CODE="${{ steps.run_validator.outputs.validator_exit_code }}"
          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "FHIR validation finished with errors (exit code: $EXIT_CODE)."
            exit 1
          fi

          echo "FHIR validation completed successfully."
