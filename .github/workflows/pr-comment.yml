name: PR Validation Comment

on:
  workflow_run:
    workflows: ["FHIR Validation"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  comment:
    name: Post sticky validation comment
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Build comment from validation artifacts
        id: build_comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          mkdir -p .ci-comment
          COMMENT_FILE=".ci-comment/pr-summary.md"
          FALLBACK_PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"

          ARTIFACTS_JSON=""
          for attempt in 1 2 3 4 5 6; do
            if ARTIFACTS_JSON="$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/runs/$RUN_ID/artifacts" 2>/dev/null)"; then
              break
            fi
            echo "Artifacts API not ready yet (attempt $attempt). Retrying..."
            sleep 5
          done

          if [[ -z "$ARTIFACTS_JSON" ]]; then
            echo "Could not retrieve artifacts for run $RUN_ID."
            if [[ -n "$FALLBACK_PR_NUMBER" ]]; then
              PR_NUMBER="$FALLBACK_PR_NUMBER"
              printf '%s\n' \
                '## FHIR Validation Summary' \
                '' \
                'Validation artifacts are not available yet.' \
                "Validation run: $RUN_URL" \
                > "$COMMENT_FILE"
              echo "has_pr=true" >> "$GITHUB_OUTPUT"
              echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          META_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-pr-meta" and .expired == false) | .id' | head -n 1)"
          SUMMARY_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-pr-summary" and .expired == false) | .id' | head -n 1)"
          HTML_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-html-report" and .expired == false) | .id' | head -n 1)"

          if [[ -z "$META_ARTIFACT_ID" ]]; then
            echo "No PR metadata artifact found."
            if [[ -n "$FALLBACK_PR_NUMBER" ]]; then
              PR_NUMBER="$FALLBACK_PR_NUMBER"
            else
              echo "has_pr=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$META_ARTIFACT_ID/zip" \
              -o .ci-comment/pr-meta.zip

            unzip -qo .ci-comment/pr-meta.zip -d .ci-comment

            PR_NUMBER="$(jq -r '.pr_number // empty' .ci-comment/pr-meta.json)"
            if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
              echo "No PR number found in metadata artifact."
              if [[ -n "$FALLBACK_PR_NUMBER" ]]; then
                PR_NUMBER="$FALLBACK_PR_NUMBER"
              else
                echo "has_pr=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi

          if [[ -n "$SUMMARY_ARTIFACT_ID" ]]; then
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$SUMMARY_ARTIFACT_ID/zip" \
              -o .ci-comment/pr-summary.zip
            unzip -qo .ci-comment/pr-summary.zip -d .ci-comment
          fi

          if [[ ! -s "$COMMENT_FILE" ]]; then
            printf '%s\n' \
              '## FHIR Validation Summary' \
              '' \
              'No renderer summary artifact was found for this run.' \
              "Validation run: $RUN_URL" \
              > "$COMMENT_FILE"
          fi

          if [[ -n "$HTML_ARTIFACT_ID" ]]; then
            HTML_ARTIFACT_URL="https://github.com/$REPOSITORY/actions/runs/$RUN_ID/artifacts/$HTML_ARTIFACT_ID"
          else
            HTML_ARTIFACT_URL="$RUN_URL"
          fi

          printf '\n## HTML Report Artifact\n\n[Download `fhir-validation-html-report`](%s)\n' "$HTML_ARTIFACT_URL" >> "$COMMENT_FILE"
          printf '\nValidation run: %s\n' "$RUN_URL" >> "$COMMENT_FILE"

          MAX_COMMENT_BYTES=65000
          CURRENT_BYTES="$(wc -c < "$COMMENT_FILE" | tr -d ' ')"
          if [[ "$CURRENT_BYTES" -gt "$MAX_COMMENT_BYTES" ]]; then
            echo "Comment body too large ($CURRENT_BYTES bytes). Building bounded errors-only summary."

            ERRORS_ROWS_FILE=".ci-comment/errors-only-rows.md"
            : > "$ERRORS_ROWS_FILE"
            awk '
              BEGIN { in_table=0; FS="\\|" }
              /^\|[[:space:]]*File[[:space:]]*\|/ { in_table=1; next }
              {
                if (in_table==1) {
                  if ($0 ~ /^\|/) {
                    if ($0 ~ /^ *\|[[:space:]]*---/) next
                    # Markdown table columns are pipe-separated:
                    # | File | Severity | Details | Location | Code | MessageId |
                    sev=$3
                    gsub(/^[ \t]+|[ \t]+$/, "", sev)
                    # Remove emoji marker when present, keep label.
                    gsub(/❌[ \t]*/, "", sev)
                    sev_upper=toupper(sev)
                    if (sev_upper ~ /^ERROR$/) print
                    next
                  }
                  in_table=0
                }
              }
            ' "$COMMENT_FILE" > "$ERRORS_ROWS_FILE"

            TOTAL_ERROR_ROWS="$(grep -c '^|' "$ERRORS_ROWS_FILE" || true)"
            if [[ -z "$TOTAL_ERROR_ROWS" ]]; then
              TOTAL_ERROR_ROWS=0
            fi

            ERROR_SUMMARY_FILE=".ci-comment/pr-summary-errors-only.md"
            printf '%s\n' \
              '## FHIR Validation Summary (errors only)' \
              '' \
              'The full summary exceeded the GitHub comment body limit.' \
              'Showing a bounded list of ERROR entries.' \
              '' \
              '| File | Severity | Details | Location | Code | MessageId |' \
              '| --- | --- | --- | --- | --- | --- |' \
              > "$ERROR_SUMMARY_FILE"

            SAFE_MAX_BYTES=60000
            SHOWN_ROWS=0
            if [[ "$TOTAL_ERROR_ROWS" -gt 0 ]]; then
              while IFS= read -r row; do
                [[ -z "$row" ]] && continue
                # Clamp long rows to keep comment stable.
                if [[ ${#row} -gt 1500 ]]; then
                  row="${row:0:1500} ..."
                fi

                printf '%s\n' "$row" >> "$ERROR_SUMMARY_FILE"
                current_size="$(wc -c < "$ERROR_SUMMARY_FILE" | tr -d ' ')"
                if [[ "$current_size" -gt "$SAFE_MAX_BYTES" ]]; then
                  # Remove last row and stop.
                  line_count="$(wc -l < "$ERROR_SUMMARY_FILE" | tr -d ' ')"
                  if [[ "$line_count" -gt 0 ]]; then
                    head -n $((line_count - 1)) "$ERROR_SUMMARY_FILE" > .ci-comment/pr-summary-errors-only.tmp
                    mv .ci-comment/pr-summary-errors-only.tmp "$ERROR_SUMMARY_FILE"
                  fi
                  break
                fi
                SHOWN_ROWS=$((SHOWN_ROWS + 1))
              done < "$ERRORS_ROWS_FILE"
            fi

            printf '\nShown ERROR rows: %s of %s.\n' "$SHOWN_ROWS" "$TOTAL_ERROR_ROWS" >> "$ERROR_SUMMARY_FILE"
            printf '\n## HTML Report Artifact\n\n[Download `fhir-validation-html-report`](%s)\n' "$HTML_ARTIFACT_URL" >> "$ERROR_SUMMARY_FILE"
            printf '\nValidation run: %s\n' "$RUN_URL" >> "$ERROR_SUMMARY_FILE"

            FINAL_SIZE="$(wc -c < "$ERROR_SUMMARY_FILE" | tr -d ' ')"
            if [[ "$FINAL_SIZE" -gt "$MAX_COMMENT_BYTES" ]]; then
              echo "Bounded errors-only summary still large ($FINAL_SIZE bytes). Applying final trim."
              FINAL_SUFFIX=$'\n\n...[summary trimmed to fit GitHub comment limit]\n'
              FINAL_SUFFIX_BYTES="$(printf '%s' "$FINAL_SUFFIX" | wc -c | tr -d ' ')"
              FINAL_ALLOWED_BYTES=$((MAX_COMMENT_BYTES - FINAL_SUFFIX_BYTES))
              if [[ "$FINAL_ALLOWED_BYTES" -lt 0 ]]; then
                FINAL_ALLOWED_BYTES=0
              fi
              {
                head -c "$FINAL_ALLOWED_BYTES" "$ERROR_SUMMARY_FILE"
                printf '%s' "$FINAL_SUFFIX"
              } > .ci-comment/pr-summary-errors-only-trimmed.md
              mv .ci-comment/pr-summary-errors-only-trimmed.md "$ERROR_SUMMARY_FILE"
            fi

            mv "$ERROR_SUMMARY_FILE" "$COMMENT_FILE"
          fi

          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        if: steps.build_comment.outputs.has_pr == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: fhir-validation
          number: ${{ steps.build_comment.outputs.pr_number }}
          path: .ci-comment/pr-summary.md
          recreate: true
          skip_unchanged: true
