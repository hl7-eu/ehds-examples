name: PR Validation Comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  comment:
    name: Post sticky validation comment
    runs-on: ubuntu-latest

    steps:
      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: fhir-validation
          recreate: true
          skip_unchanged: true
          message: |
            ## FHIR Validation

            Validation runs in the `FHIR Validation` workflow on each pull request update.

            - Check results: https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/checks
            - Workflow runs: https://github.com/${{ github.repository }}/actions/workflows/fhir-validation.yml

            Notes:
            - This comment is posted by a dedicated `pull_request_target` workflow to support fork pull requests safely.
            - No pull request branch checkout or pull request code execution happens in this comment workflow.
