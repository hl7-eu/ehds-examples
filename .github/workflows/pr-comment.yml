name: PR Validation Comment

on:
  workflow_run:
    workflows: ["FHIR Validation"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  comment:
    name: Post sticky validation comment
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Build comment from validation artifacts
        id: build_comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          mkdir -p .ci-comment
          COMMENT_FILE=".ci-comment/pr-summary.md"
          FULL_SUMMARY_FILE=".ci-comment/full-summary.md"
          : > "$COMMENT_FILE"
          rm -f "$FULL_SUMMARY_FILE"
          echo "use_filtered_renderer=false" >> "$GITHUB_OUTPUT"
          FALLBACK_PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"

          ARTIFACTS_JSON=""
          for attempt in 1 2 3 4 5 6; do
            if ARTIFACTS_JSON="$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/runs/$RUN_ID/artifacts" 2>/dev/null)"; then
              break
            fi
            echo "Artifacts API not ready yet (attempt $attempt). Retrying..."
            sleep 5
          done

          if [[ -z "$ARTIFACTS_JSON" ]]; then
            echo "Could not retrieve artifacts for run $RUN_ID."
            if [[ -n "$FALLBACK_PR_NUMBER" ]]; then
              PR_NUMBER="$FALLBACK_PR_NUMBER"
              printf '%s\n' \
                '## FHIR Validation Summary' \
                '' \
                'Validation artifacts are not available yet.' \
                "Validation run: $RUN_URL" \
                > "$COMMENT_FILE"
              echo "has_pr=true" >> "$GITHUB_OUTPUT"
              echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          META_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-pr-meta" and .expired == false) | .id' | head -n 1)"
          SUMMARY_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-pr-summary" and .expired == false) | .id' | head -n 1)"
          PRECHECK_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-precheck-summary" and .expired == false) | .id' | head -n 1)"
          HTML_ARTIFACT_ID="$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name == "fhir-validation-html-report" and .expired == false) | .id' | head -n 1)"

          if [[ -z "$META_ARTIFACT_ID" ]]; then
            echo "No PR metadata artifact found."
            if [[ -n "$FALLBACK_PR_NUMBER" ]]; then
              PR_NUMBER="$FALLBACK_PR_NUMBER"
            else
              echo "has_pr=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$META_ARTIFACT_ID/zip" \
              -o .ci-comment/pr-meta.zip

            unzip -qo .ci-comment/pr-meta.zip -d .ci-comment

            PR_NUMBER="$(jq -r '.pr_number // empty' .ci-comment/pr-meta.json)"
            if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
              echo "No PR number found in metadata artifact."
              if [[ -n "$FALLBACK_PR_NUMBER" ]]; then
                PR_NUMBER="$FALLBACK_PR_NUMBER"
              else
                echo "has_pr=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi

          if [[ -n "$HTML_ARTIFACT_ID" ]]; then
            HTML_ARTIFACT_URL="https://github.com/$REPOSITORY/actions/runs/$RUN_ID/artifacts/$HTML_ARTIFACT_ID"
          else
            HTML_ARTIFACT_URL="$RUN_URL"
          fi

          MAX_COMMENT_BYTES=62000
          VALIDATION_JSON_PATH=""
          if [[ -n "$HTML_ARTIFACT_ID" ]]; then
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$HTML_ARTIFACT_ID/zip" \
              -o .ci-comment/validation-report.zip
            unzip -qo .ci-comment/validation-report.zip -d .ci-comment
            VALIDATION_JSON_PATH="$(find .ci-comment -type f -name 'validation.json' | head -n 1 || true)"
          fi

          FULL_SUMMARY_PATH=""
          if [[ -n "$SUMMARY_ARTIFACT_ID" ]]; then
            mkdir -p .ci-comment/source-summary
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$SUMMARY_ARTIFACT_ID/zip" \
              -o .ci-comment/pr-summary.zip
            unzip -qo .ci-comment/pr-summary.zip -d .ci-comment/source-summary
            FULL_SUMMARY_PATH="$(find .ci-comment/source-summary -type f -name 'pr-summary.md' | head -n 1 || true)"
            if [[ -n "$FULL_SUMMARY_PATH" && -s "$FULL_SUMMARY_PATH" ]]; then
              cp "$FULL_SUMMARY_PATH" "$FULL_SUMMARY_FILE"
            fi
          fi

          PRECHECK_SUMMARY_FILE=""
          if [[ -n "$PRECHECK_ARTIFACT_ID" ]]; then
            mkdir -p .ci-comment/source-precheck
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$PRECHECK_ARTIFACT_ID/zip" \
              -o .ci-comment/precheck-summary.zip
            unzip -qo .ci-comment/precheck-summary.zip -d .ci-comment/source-precheck
            PRECHECK_SUMMARY_FILE="$(find .ci-comment/source-precheck -type f -name 'precheck-summary.md' | head -n 1 || true)"
          fi

          # Prefer full renderer summary first.
          if [[ -s "$FULL_SUMMARY_FILE" ]]; then
            cp "$FULL_SUMMARY_FILE" "$COMMENT_FILE"
          fi

          CURRENT_BYTES="$(wc -c < "$COMMENT_FILE" 2>/dev/null | tr -d ' ' || echo 0)"
          if [[ "$CURRENT_BYTES" -gt "$MAX_COMMENT_BYTES" ]]; then
            echo "Full renderer summary is too large for PR comment ($CURRENT_BYTES bytes). Falling back to filtered renderer summary."
            : > "$COMMENT_FILE"
          fi

          if [[ ! -s "$COMMENT_FILE" && -n "$VALIDATION_JSON_PATH" ]]; then
            jq '
              def filter_issues:
                .issue = [(.issue // [])[] | select((.severity // "" | ascii_downcase) == "error" or (.severity // "" | ascii_downcase) == "fatal")];
              if .resourceType == "OperationOutcome" then
                (filter_issues)
              elif .resourceType == "Bundle" then
                .entry = [(.entry // [])[] |
                  if (.resource.resourceType // "") == "OperationOutcome" then
                    .resource = (.resource | filter_issues)
                  else
                    .
                  end
                ]
              else
                .
              end
            ' "$VALIDATION_JSON_PATH" > .ci-comment/validation-errors-only.json
            echo "use_filtered_renderer=true" >> "$GITHUB_OUTPUT"
          fi

          echo "html_artifact_url=$HTML_ARTIFACT_URL" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "full_summary_file=$FULL_SUMMARY_FILE" >> "$GITHUB_OUTPUT"
          echo "precheck_summary_file=$PRECHECK_SUMMARY_FILE" >> "$GITHUB_OUTPUT"

          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Render filtered summary (errors/fatal only)
        if: steps.build_comment.outputs.use_filtered_renderer == 'true'
        continue-on-error: true
        uses: patrick-werner/validation-outcome-markdown-renderer@v1
        with:
          bundle-file: .ci-comment/validation-errors-only.json
          include: warnings
          pr-summary-path: .ci-comment/pr-summary-errors-only-rendered.md

      - name: Compose final comment body
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          COMMENT_FILE=".ci-comment/pr-summary.md"
          FINAL_FILE=".ci-comment/pr-summary-final.md"
          FULL_FILE="${{ steps.build_comment.outputs.full_summary_file }}"
          PRECHECK_FILE="${{ steps.build_comment.outputs.precheck_summary_file }}"
          FILTERED_RENDERED_FILE=".ci-comment/pr-summary-errors-only-rendered.md"
          MAX_COMMENT_BYTES=62000
          HTML_ARTIFACT_URL="${{ steps.build_comment.outputs.html_artifact_url }}"
          RUN_URL="${{ steps.build_comment.outputs.run_url }}"

          : > "$FINAL_FILE"

          if [[ -s "$FULL_FILE" ]]; then
            FULL_BYTES="$(wc -c < "$FULL_FILE" | tr -d ' ')"
          else
            FULL_BYTES=0
          fi

          if [[ "$FULL_BYTES" -gt 0 && "$FULL_BYTES" -le "$MAX_COMMENT_BYTES" ]]; then
            cp "$FULL_FILE" "$FINAL_FILE"
          elif [[ -s "$FILTERED_RENDERED_FILE" ]]; then
            printf '%s\n' \
              '## FHIR Validation Summary (errors/fatal only)' \
              '' \
              '**Mode:** Filtered renderer fallback' \
              '' \
              'The full renderer summary exceeded the GitHub comment limit.' \
              'Showing a renderer-generated summary from filtered `validation.json` (error/fatal only).' \
              '' \
              > "$FINAL_FILE"
            cat "$FILTERED_RENDERED_FILE" >> "$FINAL_FILE"
          elif [[ -s "$FULL_FILE" ]]; then
            cp "$FULL_FILE" "$FINAL_FILE"
          else
            printf '%s\n' \
              '## FHIR Validation Summary' \
              '' \
              'No validation summary artifact was available for this run.' \
              > "$FINAL_FILE"
          fi

          if [[ -n "$PRECHECK_FILE" && -s "$PRECHECK_FILE" ]] && grep -q 'PRECHECK_STATUS:FAILED' "$PRECHECK_FILE"; then
            {
              cat "$PRECHECK_FILE"
              printf '\n---\n\n'
              cat "$FINAL_FILE"
            } > .ci-comment/pr-summary-with-precheck.md
            mv .ci-comment/pr-summary-with-precheck.md "$FINAL_FILE"
          fi

          printf '\n## Artifacts\n\n[Download `fhir-validation-html-report` (includes `validation.html` and `validation.json`)](%s)\n' "$HTML_ARTIFACT_URL" >> "$FINAL_FILE"
          printf '\nValidation run: %s\n' "$RUN_URL" >> "$FINAL_FILE"

          FINAL_BYTES="$(wc -c < "$FINAL_FILE" | tr -d ' ')"
          if [[ "$FINAL_BYTES" -gt "$MAX_COMMENT_BYTES" ]]; then
            TRIM_NOTE=$'\n\n...[comment truncated to fit GitHub comment size limit]\n'
            NOTE_BYTES="$(printf '%s' "$TRIM_NOTE" | wc -c | tr -d ' ')"
            ALLOWED_BYTES=$((MAX_COMMENT_BYTES - NOTE_BYTES))
            if [[ "$ALLOWED_BYTES" -lt 0 ]]; then
              ALLOWED_BYTES=0
            fi
            {
              head -c "$ALLOWED_BYTES" "$FINAL_FILE"
              printf '%s' "$TRIM_NOTE"
            } > .ci-comment/pr-summary-trimmed.md
            mv .ci-comment/pr-summary-trimmed.md "$FINAL_FILE"
          fi

          mv "$FINAL_FILE" "$COMMENT_FILE"

      - name: Post sticky PR comment
        if: always() && steps.build_comment.outputs.has_pr == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: fhir-validation
          number: ${{ steps.build_comment.outputs.pr_number }}
          path: .ci-comment/pr-summary.md
          recreate: true
          skip_unchanged: true
